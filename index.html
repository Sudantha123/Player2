<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<title>Alist Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --a:#6C5CE7; --a2:#a855f7; --ag:rgba(108,92,231,.35);
  --grad:linear-gradient(135deg,#6C5CE7,#a855f7,#ec4899);
  --bg:#000; --s:rgba(255,255,255,.04); --s2:rgba(255,255,255,.07);
  --s3:rgba(255,255,255,.10); --glass:rgba(12,12,18,.75);
  --glass2:rgba(12,12,18,.88); --b:rgba(255,255,255,.06);
  --t:#f0f0f5; --t2:rgba(255,255,255,.5); --t3:rgba(255,255,255,.3);
  --r:14px; --r2:10px; --tr:.25s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;background:#000;color:var(--t);font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.player{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden;user-select:none}
video{width:100%;height:100%;display:block;object-fit:contain}

/* Loading & UI */
.loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;transition:opacity .2s;pointer-events:none}
.loader.on{opacity:1}
.ld-spinner{width:50px;height:50px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.grad-top,.grad-bot{position:absolute;left:0;right:0;z-index:18;opacity:0;transition:opacity .35s;pointer-events:none}
.grad-top{top:0;height:100px;background:linear-gradient(rgba(0,0,0,.7),transparent)}
.grad-bot{bottom:0;height:180px;background:linear-gradient(transparent,rgba(0,0,0,.85))}
.player.show-ui .grad-top,.player.show-ui .grad-bot{opacity:1}

.top-bar{position:absolute;top:0;left:0;right:0;padding:16px 20px;z-index:22;display:flex;align-items:center;opacity:0;transform:translateY(-10px);transition:all .35s}
.player.show-ui .top-bar{opacity:1;transform:translateY(0)}
.top-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

/* Controls */
.ctrl{position:absolute;bottom:0;left:0;right:0;padding:0 14px 12px;z-index:20;opacity:0;transform:translateY(8px);transition:all .35s;pointer-events:none}
.player.show-ui .ctrl{opacity:1;transform:translateY(0);pointer-events:auto}
.prog-outer{width:100%;padding:10px 0 6px;cursor:pointer}
.prog-track{width:100%;height:3px;background:rgba(255,255,255,.12);border-radius:4px;position:relative}
.prog-fill{position:absolute;top:0;left:0;height:100%;background:var(--grad);border-radius:4px}
.btn-row{display:flex;align-items:center;gap:2px}
.btn{background:none;border:none;color:#fff;cursor:pointer;padding:7px;display:flex;align-items:center}
.btn svg{width:22px;height:22px;fill:#fff}
.spacer{flex:1}
.time-txt{font-size:12px;font-weight:600;padding:0 6px;color:rgba(255,255,255,.7)}
.spd-tag{font-size:12px;font-weight:700;padding:3px 8px;background:var(--s2);border-radius:6px}

/* Tap seek labels */
.tap-label{position:absolute;top:50%;transform:translateY(-50%);z-index:15;display:none;flex-direction:column;align-items:center;gap:4px}
.tap-label.left{left:15%}
.tap-label.right{right:15%}
.tap-label.show{display:flex}
.tap-label svg{width:32px;height:32px;fill:#fff}
.tap-label span{font-size:14px;font-weight:800}

</style>
</head>
<body>

<div class="player" id="P">
    <video id="V" playsinline preload="auto"></video>
    <div class="grad-top"></div>
    <div class="grad-bot"></div>

    <div class="top-bar">
        <div class="top-title" id="topTitle">Alist Stream</div>
    </div>

    <div class="loader" id="loader"><div class="ld-spinner"></div></div>

    <div class="tap-label left" id="lblL">
        <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
        <span id="txtL">10s</span>
    </div>
    <div class="tap-label right" id="lblR">
        <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
        <span id="txtR">10s</span>
    </div>

    <div class="ctrl" id="ctrl">
        <div class="prog-outer" id="pOuter">
            <div class="prog-track"><div class="prog-fill" id="pFill"></div></div>
        </div>
        <div class="btn-row">
            <button class="btn" id="btnPlay">
                <svg id="iPlay" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                <svg id="iPause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
            </button>
            <span class="time-txt"><span id="tCur">0:00</span> / <span id="tDur">0:00</span></span>
            <div class="spacer"></div>
            <button class="btn"><span class="spd-tag" id="spdTag">1x</span></button>
            <button class="btn" id="btnFs"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
<script>
(function(){
    const $ = id => document.getElementById(id);
    const V = $('V'), P = $('P'), loader = $('loader');
    const pFill = $('pFill'), tCur = $('tCur'), tDur = $('tDur');
    
    const U = new URLSearchParams(location.search);
    const videoUrl = U.get('url');

    if(!videoUrl) {
        $('topTitle').textContent = "වීඩියෝවක් තෝරන්න";
        return;
    }

    // Title එක සකස් කිරීම
    try {
        $('topTitle').textContent = decodeURIComponent(videoUrl.split('/').pop().split('?')[0]);
    } catch(e) {}

    function init() {
        loader.classList.add('on');
        if (videoUrl.includes('.m3u8')) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(videoUrl);
                hls.attachMedia(V);
                hls.on(Hls.Events.MANIFEST_PARSED, () => V.play());
            } else if (V.canPlayType('application/vnd.apple.mpegurl')) {
                V.src = videoUrl;
            }
        } else {
            V.src = videoUrl;
        }
    }

    // UI & Controls logic
    const showUI = () => {
        P.classList.add('show-ui');
        clearTimeout(window.hideT);
        window.hideT = setTimeout(() => { if(!V.paused) P.classList.remove('show-ui'); }, 3000);
    };

    P.onclick = (e) => {
        if(e.target.closest('.ctrl')) return;
        showUI();
        if(e.detail === 2) { /* Double tap handled by separate logic or simplified here */ }
        else { V.paused ? V.play() : V.pause(); }
    };

    V.onplay = () => { $('iPlay').style.display='none'; $('iPause').style.display='block'; showUI(); };
    V.onpause = () => { $('iPlay').style.display='block'; $('iPause').style.display='none'; showUI(); };
    V.onwaiting = () => loader.classList.add('on');
    V.onplaying = () => loader.classList.remove('on');
    
    V.ontimeupdate = () => {
        const p = (V.currentTime / V.duration) * 100;
        pFill.style.width = p + '%';
        tCur.textContent = fmt(V.currentTime);
    };
    V.onloadedmetadata = () => tDur.textContent = fmt(V.duration);

    function fmt(s) {
        s = Math.floor(s);
        const m = ~~(s / 60), ss = s % 60;
        return m + ':' + String(ss).padStart(2, '0');
    }

    $('btnFs').onclick = () => {
        if (!document.fullscreenElement) P.requestFullscreen();
        else document.exitFullscreen();
    };

    init();
})();
</script>
</body>
</html>
